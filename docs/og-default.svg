<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1C1C1E"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2C2C2E" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Large receipt illustration (right side) -->
  <g transform="translate(760, 60)" opacity="0.15">
    <rect x="0" y="0" width="280" height="400" rx="8" fill="#FFFFFF"/>
    <path d="M0 392 L0 420 L28 400 L56 420 L84 400 L112 420 L140 400 L168 420 L196 400 L224 420 L252 400 L280 420 L280 392 Z" fill="#FFFFFF"/>
    <rect x="24" y="40" width="120" height="8" rx="4" fill="#AEAEB2"/>
    <rect x="24" y="60" width="180" height="8" rx="4" fill="#AEAEB2"/>
    <rect x="24" y="80" width="150" height="8" rx="4" fill="#AEAEB2"/>
    <rect x="24" y="100" width="180" height="8" rx="4" fill="#AEAEB2"/>
    <rect x="24" y="120" width="130" height="8" rx="4" fill="#AEAEB2"/>
    <rect x="24" y="160" width="180" height="1.5" fill="#D1D1D6"/>
    <rect x="24" y="176" width="180" height="14" rx="7" fill="#FF9F0A"/>
  </g>

  <!-- Logo mark (small, top-left) -->
  <g transform="translate(80, 72) scale(0.55)">
    <circle cx="60" cy="60" r="60" fill="#2C2C2E"/>
    <rect x="32" y="18" width="56" height="72" rx="3" fill="#FFFFFF"/>
    <path d="M32 82 L32 90 L38 84 L44 90 L50 84 L56 90 L62 84 L68 90 L74 84 L80 90 L86 84 L88 90 L88 82 Z" fill="#FFFFFF"/>
    <ellipse cx="79" cy="23" rx="13" ry="14" fill="#2C2C2E"/>
    <path d="M79 9 Q85 4 84 10" stroke="#2C2C2E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <rect x="40" y="32" width="28" height="2.5" rx="1.25" fill="#AEAEB2"/>
    <rect x="40" y="40" width="36" height="2.5" rx="1.25" fill="#AEAEB2"/>
    <rect x="40" y="48" width="30" height="2.5" rx="1.25" fill="#AEAEB2"/>
    <rect x="40" y="56" width="36" height="2.5" rx="1.25" fill="#AEAEB2"/>
    <rect x="38" y="64" width="44" height="1" fill="#D1D1D6"/>
    <rect x="38" y="69" width="44" height="5" rx="2.5" fill="#FF9F0A"/>
  </g>

  <!-- Brand name -->
  <text x="150" y="118" font-family="-apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif" font-size="28" font-weight="600" fill="#AEAEB2" letter-spacing="2">花蘋果</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="-apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif" font-size="72" font-weight="700" fill="#FFFFFF">你花了多少</text>
  <text x="80" y="356" font-family="-apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif" font-size="72" font-weight="700" fill="#FFFFFF">在蘋果上？</text>

  <!-- Subtext -->
  <text x="82" y="430" font-family="-apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif" font-size="28" fill="#636366">iPhone · Mac · iPad · Apple Watch · 訂閱服務</text>

  <!-- CTA pill -->
  <rect x="80" y="476" width="220" height="52" rx="26" fill="#FF9F0A"/>
  <text x="190" y="509" font-family="-apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif" font-size="22" font-weight="600" fill="#000000" text-anchor="middle">開始計算 →</text>

  <!-- Bottom domain -->
  <text x="80" y="590" font-family="-apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif" font-size="20" fill="#48484A">iphone-cost.pages.dev</text>
</svg>
